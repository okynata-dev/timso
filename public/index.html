<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>timso® — live sales</title>
<meta name="description" content="A live feed of every timso sale, across every collection." />
<link rel="canonical" href="https://timsouw.com/" />

<!-- icons -->
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#0b0b0c" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#efeee9" media="(prefers-color-scheme: light)" />

<!-- open graph / twitter -->
<meta property="og:title" content="timso® — live sales" />
<meta property="og:description" content="A live feed of every timso sale, across every collection." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://timsouw.com/" />
<meta property="og:site_name" content="timso" />
<meta property="og:image" content="https://timsouw.com/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="timso® — live sales" />
<meta name="twitter:description" content="A live feed of every timso sale, across every collection." />
<meta name="twitter:image" content="https://timsouw.com/og.png" />

<link rel="preconnect" href="https://i.seadn.io" crossorigin />
<link rel="preconnect" href="https://i2c.seadn.io" crossorigin />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="bar">
  <div class="bar-in">
    <a class="word" href="/">timso<span class="tm">®</span></a>
    <div class="bar-right">
      <nav class="nav">
        <a href="#feed">FEED</a>
        <a href="#works">WORKS</a>
      </nav>
      <div class="live" id="live" title="data freshness">
        <span class="dot"></span><span id="liveLabel">CONNECTING</span>
      </div>
    </div>
  </div>
</header>

<main>
  <!-- HERO / THE FEED ----------------------------------------------------- -->
  <section class="hero">
    <div class="hero-head">
      <h1 class="ow">&ldquo;THE&nbsp;FEED&rdquo;</h1>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="l">DAY</div><div class="k" id="d_n">—</div><div class="v" id="d_v">&nbsp;</div></div>
      <div class="stat"><div class="l">WEEK</div><div class="k" id="w_n">—</div><div class="v" id="w_v">&nbsp;</div></div>
      <div class="stat"><div class="l">MONTH</div><div class="k" id="m_n">—</div><div class="v" id="m_v">&nbsp;</div></div>
      <div class="stat"><div class="l">ALL&nbsp;TIME</div><div class="k" id="a_n">—</div><div class="v" id="a_v">&nbsp;</div></div>
    </div>

    <section id="feed" class="feed" aria-live="polite">
      <div class="skeleton-feed" id="feedSkeleton">
        <div class="srow"></div><div class="srow"></div><div class="srow"></div>
        <div class="srow"></div><div class="srow"></div>
      </div>
    </section>
    <button class="more" id="feedMore" hidden>LOAD MORE</button>
  </section>

  <!-- COLLECTIONS --------------------------------------------------------- -->
  <section id="works" class="works">
    <div class="works-head">
      <h2 class="ow">&ldquo;COLLECTIONS&rdquo;</h2>
    </div>
    <div class="grid" id="grid">
      <div class="gskel"></div><div class="gskel"></div><div class="gskel"></div><div class="gskel"></div>
    </div>
  </section>
</main>

<script src="/app.js" type="module"></script>
</body>
</html>
